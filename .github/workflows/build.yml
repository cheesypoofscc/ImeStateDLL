name: Build ImeState DLL

on:
  workflow_dispatch:


jobs:

  build:

    runs-on: windows-latest


    steps:

    - name: Checkout
      uses: actions/checkout@v5


    - name: Build DLL
      shell: cmd
      run: |

        call "%ProgramFiles(x86)%\Microsoft Visual Studio\Installer\vswhere.exe" -latest -property installationPath > vs.txt

        set /p VS_PATH=<vs.txt

        call "%VS_PATH%\Common7\Tools\VsDevCmd.bat"

        cl /LD /O2 ImeState.cpp ole32.lib oleaut32.lib



    - name: Upload DLL
      uses: actions/upload-artifact@v4
      with:
        name: ImeStateDLL
        path: ImeState.dll
