name: Build ImeState DLL x64


on:
  workflow_dispatch:


jobs:

  build:

    runs-on: windows-latest


    steps:


    # ==========================
    # 获取源码
    # ==========================
    - name: Checkout source
      uses: actions/checkout@v5



    # ==========================
    # 编译 x64 DLL
    # ==========================
    - name: Build DLL x64
      shell: cmd
      run: |

        echo Finding Visual Studio...


        call "%ProgramFiles(x86)%\Microsoft Visual Studio\Installer\vswhere.exe" ^
          -latest ^
          -property installationPath > vs_path.txt


        set /p VS_PATH=<vs_path.txt


        echo VS_PATH=%VS_PATH%



        echo Initializing MSVC x64...


        call "%VS_PATH%\Common7\Tools\VsDevCmd.bat" -arch=x64



        echo Building DLL...



        cl ^
          /LD ^
          /O2 ^
          /EHsc ^
          ImeState.cpp ^
          ole32.lib ^
          oleaut32.lib ^
          imm32.lib ^
          user32.lib



        if not exist ImeState.dll (

            echo ERROR: DLL not generated

            exit /b 1
        )



        echo Build success





    # ==========================
    # 检查 DLL 是否 x64
    # ==========================
    - name: Verify DLL architecture
      shell: cmd
      run: |


        call "%ProgramFiles(x86)%\Microsoft Visual Studio\Installer\vswhere.exe" ^
          -latest ^
          -property installationPath > vs_path.txt



        set /p VS_PATH=<vs_path.txt



        call "%VS_PATH%\Common7\Tools\VsDevCmd.bat" -arch=x64



        echo Checking architecture...



        dumpbin /headers ImeState.dll | findstr machine



    # ==========================
    # 上传 DLL
    # ==========================
    - name: Upload DLL Artifact
      uses: actions/upload-artifact@v4

      with:

        name: ImeStateDLL-x64

        path: |

          ImeState.dll
